<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Architect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="top-bar">
            <div class="logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                    <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                    <line x1="6" y1="6" x2="6.01" y2="6"></line>
                    <line x1="6" y1="18" x2="6.01" y2="18"></line>
                </svg>
                <span>Pipeline Architect</span>
            </div>
            <div class="top-actions">
                <button id="run-btn" class="btn btn-primary">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    Run Simulation
                </button>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <div class="section-header">Editor</div>
                    <div class="editor-container">
                        <textarea id="instruction-input" spellcheck="false" placeholder="ADD R1, R2, R3..."></textarea>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="section-header">Configuration</div>
                    <div class="config-grid">
                        <label>Pipeline Model</label>
                        <select id="pipeline-model" class="modern-select">
                            <option value="5">5-Stage (IF-ID-EX-MEM-WB)</option>
                            <option value="4">4-Stage (IF-ID-EX-MEM/WB)</option>
                        </select>
                        
                        <label>Data Forwarding</label>
                        <select id="forwarding-toggle" class="modern-select">
                            <option value="false">Disabled (Stall)</option>
                            <option value="true">Enabled (Bypass)</option>
                        </select>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="section-header">Execution Control</div>
                    <div class="exec-actions">
                        <button id="step-btn" class="btn btn-secondary">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="13 17 18 12 13 7"></polyline><line x1="6" y1="17" x2="11" y2="12"></line><line x1="6" y1="7" x2="11" y2="12"></line></svg>
                            Step Cycle
                        </button>
                        <button id="reset-btn" class="btn btn-danger">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
                            Reset
                        </button>
                    </div>
                </div>
                
                <div class="sidebar-section legend-section">
                    <div class="section-header">Legend</div>
                    <div class="legend-grid">
                        <div class="l-item"><span class="l-dot l-if"></span> IF</div>
                        <div class="l-item"><span class="l-dot l-id"></span> ID</div>
                        <div class="l-item"><span class="l-dot l-ex"></span> EX</div>
                        <div class="l-item"><span class="l-dot l-mem"></span> MEM</div>
                        <div class="l-item"><span class="l-dot l-wb"></span> WB</div>
                        <div class="l-item"><span class="l-dot l-stall"></span> STALL</div>
                        <div class="l-item"><span class="l-dot l-fwd"></span> FWD</div>
                    </div>
                </div>
            </aside>

            <div class="workspace">
                <div class="panel grid-panel">
                    <div class="panel-header">
                        <span class="tab active">Timeline</span>
                    </div>
                    <div class="panel-content grid-scroll">
                        <table id="pipeline-grid" class="modern-grid">
                            <thead>
                                <tr id="cycle-headers">
                                    <th>INSTRUCTION</th>
                                </tr>
                            </thead>
                            <tbody id="grid-body">
                                <!-- JS injected -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="panel terminal-panel">
                    <div class="panel-header">
                        <span class="tab active">Execution Output</span>
                    </div>
                    <div class="panel-content terminal-content" id="hazard-log">
                        <!-- JS injected -->
                    </div>
                </div>
            </div>
        </div>
        
        <footer class="status-bar">
            <div class="status-left">
                <span id="system-status" class="status-badge standby">STANDBY</span>
                <span class="status-path">plaksha/focs/pipeline</span>
            </div>
            <div class="status-right">
                Cycles: <span id="cycle-count">0</span>
            </div>
        </footer>
    </div>

    <script src="pipeline.js"></script>
    <script src="ui.js"></script>
</body>
</html>
